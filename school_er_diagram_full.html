`}
];

const nav=document.getElementById('nav');
const panelsEl=document.getElementById('panels');
const descEl=document.getElementById('desc');
const rendered={};

async function showDomain(id){
  document.querySelectorAll('.dn-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.dataset.id===id));
  const d=DOMAINS.find(x=>x.id===id);
  descEl.textContent=d.desc;
  if(rendered[id]) return;
  const panel=document.querySelector(`.panel[data-id="${id}"]`);
  panel.innerHTML='<div class="loading">Rendering diagram…</div>';
  try{
    const uid='erd-'+id+'-'+Math.random().toString(36).slice(2);
    const {svg}=await mermaid.render(uid,d.diagram.trim());
    panel.innerHTML=svg;
    panel.querySelectorAll('svg').forEach(s=>{
      s.removeAttribute('height');s.style.maxWidth='100%';s.style.height='auto';
    });
    panel.querySelectorAll('.node').forEach(node=>{
      const fp=node.querySelector('path[d]');
      if(!fp)return;
      const pts=fp.getAttribute('d').match(/-?[\d.]+/g)?.map(Number);
      if(!pts||pts.length<8)return;
      const xs=[pts[0],pts[2],pts[4],pts[6]],ys=[pts[1],pts[3],pts[5],pts[7]];
      if(!xs.every(Number.isFinite))return;
      const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
      const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
      r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('rx','8');
      for(const a of['fill','stroke','stroke-width','class','style']){if(fp.hasAttribute(a))r.setAttribute(a,fp.getAttribute(a));}
      fp.replaceWith(r);
    });
    panel.querySelectorAll('.row-rect-odd path,.row-rect-even path').forEach(p=>p.setAttribute('stroke','none'));
    rendered[id]=true;
  }catch(e){
    panel.innerHTML='<div class="loading">Could not render — try another domain.</div>';
    console.error(e);
  }
}

DOMAINS.forEach(d=>{
  const btn=document.createElement('button');
  btn.className='dn-btn';btn.dataset.id=d.id;btn.textContent=d.name;
  btn.onclick=()=>showDomain(d.id);
  nav.appendChild(btn);
  const panel=document.createElement('div');
  panel.className='panel';panel.dataset.id=d.id;
  panelsEl.appendChild(panel);
});

showDomain('overview');
</script>
