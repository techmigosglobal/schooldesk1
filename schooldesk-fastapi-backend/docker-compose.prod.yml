services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${SCHOOLDESK_ENV_FILE:-.env.production}
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - ${SCHOOLDESK_ENV_FILE:-.env.production}
    volumes:
      - schooldesk_fastapi_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    env_file:
      - ${SCHOOLDESK_ENV_FILE:-.env.production}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - schooldesk_fastapi_redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  schooldesk_fastapi_postgres:
  schooldesk_fastapi_redis:
