global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: schooldesk-go-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - go-api:8080
        labels:
          app: schooldesk
          component: backend
